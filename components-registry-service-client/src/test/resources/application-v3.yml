server:
  port: 4567

components-registry:
  vcs:
    enabled: false
  work-dir: ${COMPONENTS_REGISTRY_SERVICE_TEST_DATA_DIR}/components-registry/production
  copyright-path: ${components-registry.work-dir}/copyrights
  main-groovy-file: Aggregator.groovy
  groovy-path: ${components-registry.work-dir}

  supportedGroupIds: org.octopusden.octopus,io.bcomponent
  supportedSystems: NONE,CLASSIC,ALFA
  version-name:
    service-branch: serviceCBranch
    service: serviceC
    minor: minorC
  product-type:
    c: PT_C
    k: PT_K
    d: PT_D
    ddb: PT_D_DB

pathToConfig: file://${components-registry.groovy-path}

eureka.client.enabled: false

# Stub auth-server so WebSecurityConfig.jwtDecoder() constructs without a reachable
# Keycloak. AuthServerClient is replaced with a Mockito @MockBean in every
# @SpringBootTest in this module.
auth-server:
  url: http://localhost:0
  realm: test

octopus-security:
  roles:
    ROLE_F1_ADMIN:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - DELETE_COMPONENTS
      - IMPORT_DATA
      - ACCESS_AUDIT
    ROLE_REGISTRY_EDITOR:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ACCESS_AUDIT
    ROLE_REGISTRY_VIEWER:
      - ACCESS_COMPONENTS
      - ACCESS_AUDIT
