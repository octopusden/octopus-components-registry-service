spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false

teamcity:
  validation:
    gradle-build-template-id: FIXTURE_GRADLE_TEMPLATE
    maven-build-template-id: FIXTURE_MAVEN_TEMPLATE
    release-family-template-ids:
      - FIXTURE_RELEASE_TEMPLATE
    gradle-default-build-step-id: FIXTURE_GRADLE_STEP
    maven-default-build-step-id: FIXTURE_MAVEN_STEP
