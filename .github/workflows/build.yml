# INTERNAL — triggered on push to main and manually; PR builds are handled by merge-gate.yml.
name: Gradle Compile & UT

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-build-and-deploy:
    uses: octopusden/octopus-base/.github/workflows/common-java-gradle-build.yml@v2.4.0
    with:
      flow-type: hybrid
      java-version: '21'
      docker-image: components-registry-service
    secrets: inherit
