apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: components-registry-template
objects:
  - apiVersion: v1
    kind: Pod
    metadata:
      name: ${DEPLOYMENT_PREFIX}-postgres
      labels:
        app.kubernetes.io/name: ${DEPLOYMENT_PREFIX}-postgres
    spec:
      restartPolicy: Never
      activeDeadlineSeconds: ${{ACTIVE_DEADLINE_SECONDS}}
      containers:
        - name: postgres
          image: ${DOCKER_REGISTRY}/postgres:16
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "components_registry"
            - name: POSTGRES_USER
              value: "crs"
            - name: POSTGRES_PASSWORD
              value: "crs"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "crs", "-d", "components_registry"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
  - apiVersion: v1
    kind: Service
    metadata:
      name: ${DEPLOYMENT_PREFIX}-postgres-service
    spec:
      ports:
        - port: 5432
          protocol: TCP
          targetPort: 5432
      selector:
        app.kubernetes.io/name: ${DEPLOYMENT_PREFIX}-postgres
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: ${DEPLOYMENT_PREFIX}-components-registry-config-data
    data:
      Aggregator.groovy: |-
        ${AGGREGATOR_GROOVY_CONTENT}
      Defaults.groovy: |-
        ${DEFAULTS_GROOVY_CONTENT}
      TestComponents.groovy: |-
        ${TEST_COMPONENTS_GROOVY_CONTENT}
      application-test.yaml: |-
        ${APPLICATION_TEST_CONTENT}
      dependency1-copyright: |-
        ${DEPENDENCY1_COPYRIGHT}
      dependency2-copyright: |-
        ${DEPENDENCY2_COPYRIGHT}
      ee-client-specific-component-copyright: |-
        ${EE_CLIENT_SPECIFIC_COMPONENT_COPYRIGHT}
      ee-component-copyright: |-
        ${EE_COMPONENT_COPYRIGHT}
  - apiVersion: v1
    kind: Pod
    metadata:
      name: ${DEPLOYMENT_PREFIX}-comp-reg
      labels:
        app.kubernetes.io/name: ${DEPLOYMENT_PREFIX}-comp-reg
    spec:
      restartPolicy: Never
      activeDeadlineSeconds: ${{ACTIVE_DEADLINE_SECONDS}}
      initContainers:
        - name: wait-for-postgres
          image: ${DOCKER_REGISTRY}/postgres:16
          command: ["sh", "-c", "until pg_isready -h ${DEPLOYMENT_PREFIX}-postgres-service -p 5432 -U crs; do sleep 2; done"]
      containers:
        - name: comp-reg
          image: ${DOCKER_REGISTRY}/octopusden/components-registry-service:${COMPONENTS_REGISTRY_SERVICE_VERSION}
          ports:
            - containerPort: 4567
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 4567
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "/"
            - name: SPRING_PROFILES_ACTIVE
              value: "test"
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://${DEPLOYMENT_PREFIX}-postgres-service:5432/components_registry"
            - name: SPRING_DATASOURCE_USERNAME
              value: "crs"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "crs"
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "validate"
            - name: AUTH_SERVER_URL
              value: ${AUTH_SERVER_URL}
            - name: AUTH_SERVER_REALM
              value: ${AUTH_SERVER_REALM}
          volumeMounts:
            - name: components-registry-dir
              mountPath: /components-registry
              readOnly: true
            - name: application-test
              mountPath: /application-test.yaml
              subPath: application-test.yaml
              readOnly: true
      volumes:
        - name: components-registry-dir
          configMap:
            name: ${DEPLOYMENT_PREFIX}-components-registry-config-data
            items:
              - key: Aggregator.groovy
                path: Aggregator.groovy
              - key: Defaults.groovy
                path: Defaults.groovy
              - key: TestComponents.groovy
                path: TestComponents.groovy
              - key: dependency1-copyright
                path: ./copyrights/dependency1-copyright
              - key: dependency2-copyright
                path: ./copyrights/dependency2-copyright
              - key: ee-client-specific-component-copyright
                path: ./copyrights/ee-client-specific-component-copyright
              - key: ee-component-copyright
                path: ./copyrights/ee-component-copyright
        - name: application-test
          configMap:
            name: ${DEPLOYMENT_PREFIX}-components-registry-config-data
            items:
              - key: application-test.yaml
                path: application-test.yaml
  - apiVersion: v1
    kind: Service
    metadata:
      name: ${DEPLOYMENT_PREFIX}-comp-reg-service
    spec:
      ports:
        - port: 4567
          protocol: TCP
          targetPort: 4567
      selector:
        app.kubernetes.io/name: ${DEPLOYMENT_PREFIX}-comp-reg
  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: ${DEPLOYMENT_PREFIX}-comp-reg-route
    spec:
      port:
        targetPort: 4567
      to:
        kind: Service
        name: ${DEPLOYMENT_PREFIX}-comp-reg-service
parameters:
  - description: Unique deployment prefix
    name: DEPLOYMENT_PREFIX
    required: true
  - description: Active deadline seconds
    name: ACTIVE_DEADLINE_SECONDS
    required: true
  - description: Docker registry
    name: DOCKER_REGISTRY
    required: true
  - description: Components registry service version
    name: COMPONENTS_REGISTRY_SERVICE_VERSION
    required: true
  - description: Aggregator.groovy content
    name: AGGREGATOR_GROOVY_CONTENT
    required: true
  - description: Defaults.groovy content
    name: DEFAULTS_GROOVY_CONTENT
    required: true
  - description: TestComponents.groovy content
    name: TEST_COMPONENTS_GROOVY_CONTENT
    required: true
  - description: application-test.yaml content
    name: APPLICATION_TEST_CONTENT
    required: true
  - description: Dependency1 copyright content
    name: DEPENDENCY1_COPYRIGHT
    required: true
  - description: Dependency2 copyright content
    name: DEPENDENCY2_COPYRIGHT
    required: true
  - description: EE client specific copyright content
    name: EE_CLIENT_SPECIFIC_COMPONENT_COPYRIGHT
    required: true
  - description: EE component copyright content
    name: EE_COMPONENT_COPYRIGHT
    required: true
  - description: Keycloak auth-server base URL (no trailing slash)
    name: AUTH_SERVER_URL
    required: true
  - description: Keycloak realm name
    name: AUTH_SERVER_REALM
    required: true
