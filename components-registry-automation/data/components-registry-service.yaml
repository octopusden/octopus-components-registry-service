eureka:
  client:
    enabled: false

server:
  port: 4567

components-registry:
  vcs:
    enabled: false
  work-dir: /components-registry
  groovy-path: ${components-registry.work-dir}
  main-groovy-file: Aggregator.groovy
  supportedGroupIds: corp.domain
  supportedSystems: NONE,CLASSIC
  version-name:
    service-branch: serviceCBranch
    service: serviceC
    minor: minorC
  product-type:
    c: PT_C
    k: PT_K
    d: PT_D
    ddb: PT_D_DB
  copyright-path: ${components-registry.groovy-path}/copyrights

repositoryPath: /whiskey-builds
supportedGroupIds: corp.domain
supportedSystems: NONE,CLASSIC

# auth-server.url and auth-server.realm are injected by the OKD template as
# AUTH_SERVER_URL and AUTH_SERVER_REALM env vars (Spring's relaxed binding maps
# them to auth-server.url/realm). The actual values come from Gradle project
# properties at ocProcess time (-Pauth-server.url=..., -Pauth-server.realm=...),
# which TeamCity passes from its project configuration. Missing either will
# fail the Gradle build before the template is even processed.

octopus-security:
  roles:
    # Reads on v4 are public at the filter-chain level; ROLE_ANONYMOUS carries
    # ACCESS_COMPONENTS so @PreAuthorize on GET methods also passes without auth.
    ROLE_ANONYMOUS:
      - ACCESS_COMPONENTS
    ROLE_REGISTRY_VIEWER:
      - ACCESS_COMPONENTS
      - ACCESS_AUDIT
    ROLE_REGISTRY_EDITOR:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ACCESS_AUDIT
    # Super-admin — reuses existing Keycloak realm-role `ADMIN`.
    ROLE_ADMIN:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ARCHIVE_COMPONENTS
      - RENAME_COMPONENTS
      - DELETE_COMPONENTS
      - IMPORT_DATA
      - ACCESS_AUDIT

logging:
  level:
    org.octopusden.octopus.escrow: DEBUG
    org.octopusden.octopus.crs: DEBUG
    org.octopusden.octopus.components.registry: DEBUG
