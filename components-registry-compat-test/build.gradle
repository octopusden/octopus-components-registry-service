plugins {
    id 'java-library'
}

description = 'API v1/v2/v3 compatibility tests — baseline (prod, main) vs candidate (v3 migration)'

// Compat tests run only on demand (TeamCity manual button or explicit local invocation).
// Regular `./gradlew build` MUST NOT trigger them: the `test` task is gated on
// AT LEAST ONE of the compat URLs being set. Same for `check` — disabled so this
// module contributes nothing to the verification lifecycle.
//
// The asymmetric "at least one" gate (rather than "both") is deliberate: it lets
// the test JVM run when the caller provides any compat config so that
// `CompatConfig.explainInvalid()` produces a clear fail-fast error if exactly
// one URL is missing. Gating on "both" at the Gradle layer would silently skip
// a partial-config run and report BUILD SUCCESSFUL, hiding the misconfiguration
// that the README documents as fail-fast.
def compatActivated = {
    def baseline = project.findProperty('compat.baseline.url') ?: System.getenv('COMPAT_BASELINE_URL')
    def candidate = project.findProperty('compat.candidate.url') ?: System.getenv('COMPAT_CANDIDATE_URL')
    def hasBaseline = baseline != null && !baseline.toString().isBlank()
    def hasCandidate = candidate != null && !candidate.toString().isBlank()
    return hasBaseline || hasCandidate
}
tasks.named('check') { enabled = false }

dependencies {
    testImplementation project(':components-registry-service-client')
    testImplementation project(':components-registry-service-core')

    testImplementation "com.fasterxml.jackson.core:jackson-databind"
    testImplementation "com.fasterxml.jackson.module:jackson-module-kotlin"
    // API beans (e.g. EscrowBean) expose Optional<…> fields; VersionRangeMapCanonicalizer round-trips
    // them, so its mapper (findAndRegisterModules) needs the jdk8 datatype module on the classpath.
    testImplementation "com.fasterxml.jackson.datatype:jackson-datatype-jdk8"
    testImplementation "com.squareup.okhttp3:okhttp:4.12.0"
    testImplementation "org.assertj:assertj-core:3.25.3"
    testImplementation "org.slf4j:slf4j-api:2.0.13"
    testRuntimeOnly "ch.qos.logback:logback-classic:1.3.14"
}

tasks.named('publish') { enabled = false }
tasks.named('publishToMavenLocal') { enabled = false }

test {
    onlyIf("at least one of compat.baseline.url / compat.candidate.url is set (partial config triggers explainInvalid)") { compatActivated() }
    // Compat runs hit live stands whose state (cache snapshots, deployments) changes
    // independently of source. Gradle's input-hash-based UP-TO-DATE check considers two
    // back-to-back invocations identical and skips the second one — leaving the previous
    // ndjson on disk for compatibilityReporter to re-aggregate. Always re-run.
    outputs.upToDateWhen { false }
    // Pin the test JVM's CWD to this subproject's root so the relative-path
    // fallback inside ExecutionLogger/DiffCollector (`Path.of("build/reports/compat")`)
    // always resolves to the SAME absolute directory the compatibilityReporter
    // task aggregates from. Without this, id17 build #13 showed JVM CWD as
    // something deeper than projectDir on the TC agent, the .ndjson files
    // landed in a doubled `components-registry-compat-test/components-registry-compat-test/...`
    // path, and reporter saw zero files.
    workingDir = projectDir
    // Each run starts with a fresh report dir so per-worker ndjson files don't accumulate
    // across re-runs (the file names contain a UUID — old files would otherwise be merged
    // into summary.md again, double-counting diffs).
    //
    // ALSO: this is the place where we set `compat.report-dir` to the same dir
    // — see the long comment above the second `doFirst` block below for why
    // it has to happen at task-execution time rather than via the
    // `systemProperties` map literal.
    doFirst {
        def reportDir = layout.buildDirectory.dir('reports/compat').get().asFile
        if (reportDir.exists()) {
            reportDir.listFiles({ f -> f.name.endsWith('.ndjson') } as FileFilter)?.each { it.delete() }
            new File(reportDir, 'summary.md').delete()
            new File(reportDir, 'execution-log.md').delete()
        } else {
            reportDir.mkdirs()
        }
        // ALSO wipe the /tmp backup dir used by the workaround below. Without
        // this, files from a prior aborted run accumulate on persistent TC
        // agents — and if the current run's primary reportDir gets cleared
        // mid-run (the known Gradle stale-output quirk we work around), the
        // reporter's fallback would aggregate stale records from a different
        // commit / DSL snapshot, producing a falsely-clean or falsely-red
        // result. PR #297 review (P1): scope to the current run.
        def tmpBackup = new File("${System.getProperty('java.io.tmpdir')}/crs-compat-backup")
        if (tmpBackup.exists()) {
            tmpBackup.listFiles({ f -> (f.name.startsWith('diff-worker-') || f.name.startsWith('exec-worker-')) && f.name.endsWith('.ndjson') } as FileFilter)?.each { it.delete() }
        }
        // Also wipe the writer-init marker files. These accumulate on persistent
        // TC agents (the reporter walks /tmp for them in its doLast diagnostic)
        // and would otherwise mix diagnostics across builds.
        def tmpDir2 = new File(System.getProperty('java.io.tmpdir'))
        if (tmpDir2.exists()) {
            tmpDir2.listFiles({ f -> f.name.startsWith('compat-exec-logger-marker-') && f.name.endsWith('.txt') } as FileFilter)?.each { it.delete() }
        }
    }
    useJUnitPlatform {
        // Include-by-tag polarity: `:test` runs ONLY suites that extend
        // CompatibilityTestBase (which carries `@Tag("http")` — inherited to
        // every subclass). Pure-Kotlin unit suites lack the `http` tag and run
        // via the separate `:unitTest` task below.
        //
        // Why include rather than exclude `unit`: a new pure-unit test class
        // that forgets the `@Tag("unit")` marker would, under exclude-based
        // polarity, fall into `:test` here and be silently skipped on PR runs
        // (no URLs configured). With include-by-`http`, an untagged class
        // automatically lands in `:unitTest` instead — the PR-time gate
        // catches the new code regardless of whether the author tagged it.
        includeTags 'http'
    }
    systemProperties = [
        'junit.jupiter.execution.parallel.enabled': true,
        'junit.jupiter.execution.parallel.mode.default': 'concurrent',
        'junit.jupiter.execution.parallel.config.strategy': 'fixed',
        'junit.jupiter.execution.parallel.config.fixed.parallelism': (project.findProperty('compat.parallelism') ?: '8') as String,
    ]
    // Absolute path to the same dir compatibilityReporter aggregates from —
    // wired inside a doFirst block (execution phase) because both earlier
    // attempts failed on the TC agent's gradle/JVM combination:
    //
    //   - Putting `layout.buildDirectory.dir(...).get().asFile.absolutePath`
    //     inside the `systemProperties = [...]` map literal evaluated eagerly
    //     at configuration phase. id17 #3631 showed the result as the
    //     RELATIVE module basename `components-registry-compat-test/build/
    //     reports/compat` (while the compatibilityReporter task — same
    //     expression, but running in doLast at execution phase — saw the
    //     absolute `/opt/TeamCity/.../components-registry-compat-test/build/
    //     reports/compat`). The relative value resolved against the test
    //     JVM's relative `user.dir` and the per-worker ndjson landed in a
    //     doubled-prefix path the reporter never read.
    //   - Switching to `systemProperty(name, providers.provider { ... })`
    //     (a deferred Provider) was a misread of the Gradle API. The Test
    //     task's `systemProperty(String, Object)` documents the value is
    //     converted via `Object.toString()`; the Provider is NOT unwrapped,
    //     so the test JVM received the literal string `provider(?)` as the
    //     property value. id17 #3633 surfaced this by failing 15834 tests
    //     with `IllegalStateException: compat.report-dir must be absolute
    //     — got 'provider(?)'` from `resolveReportDir`.
    //
    // The doFirst block below runs at task execution time, by which point
    // layout.buildDirectory is finalised and `.canonicalPath` returns an
    // absolute path (defence in depth vs `.absolutePath` — canonical
    // resolves through the filesystem rather than going via user.dir).
    //
    // Wired via `jvmArgs "-D..."` rather than `systemProperty(...)`
    // because id17 #3634 showed `systemProperty` set inside doFirst not
    // taking effect — the test JVM kept seeing the (config-phase) value.
    // `jvmArgs` mutates the JVM command-line that's assembled at fork
    // time, so a value appended in doFirst lands on the actual JVM args.
    //
    // The `resolveReportDir` check in the test code still asserts
    // absolute-ness as a backstop for any future regression.
    doFirst {
        def reportDirAbs = layout.buildDirectory.dir('reports/compat').get().asFile.canonicalPath
        println "[compat-test] doFirst: setting -Dcompat.report-dir=${reportDirAbs}"
        jvmArgs "-Dcompat.report-dir=${reportDirAbs}"
    }
    // Surface compat config as system properties for the test code.
    ['compat.baseline.url', 'compat.candidate.url', 'compat.rms.url',
     'compat.full', 'compat.malformed', 'compat.versions-fallback',
     'compat.max-components',
     'compat.smoke-components',
     'compat.trace.file',
     'compat.trace.limit',
     'compat.bodies.file',
     'compat.verbose',
     'compat.allow-non-db-candidate',
     'compat.candidate.mode',
     'compat.versions.file',
     'compat.residual.file',
     'compat.cluster.project-keys',
     'compat.cluster.distribution-pairs'].each { name ->
        def value = project.findProperty(name) ?: System.getenv(name.toUpperCase().replace('.', '_').replace('-', '_'))
        if (value != null) {
            systemProperty name, value
        }
    }
    // Reports land in build/reports/compat
    finalizedBy 'compatibilityReporter'
    // Always show test outcomes for diagnostic purposes
    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = false
    }
}

// Fast-lane Test task for everything that does NOT need a live stand: pure Kotlin +
// JUnit5, no compat URL config. Runs in seconds and is the PR-time gate for compat
// framework correctness.
//
// The partition is `excludeTags 'http'` here vs. `includeTags 'http'` on `:test`.
// `@Tag("http")` is inherited from CompatibilityTestBase, so every live-stand suite
// is auto-routed to `:test` and every pure-Kotlin suite — tagged or not — falls
// here. That is by design: a future pure-unit test class that forgets `@Tag("unit")`
// must still execute on PRs, not vanish into the URL-gated bucket.
//
// NOTE on `check` integration: this module's `check` is `enabled = false` (line ~25
// above) — `gradlew build` does NOT auto-call `:unitTest`. Operators invoke it
// directly: `./gradlew :components-registry-compat-test:unitTest`. CI configuration
// (TeamCity / GitHub Actions step) names this task explicitly. Keeping `check`
// disabled preserves the existing "compat module is opt-in" guarantee for the root
// `./gradlew build`.
tasks.register('unitTest', Test) {
    group = 'verification'
    description = 'Pure-Kotlin unit tests (everything not tagged `http`) — no live HTTP, no compat URL config.'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        excludeTags 'http'
    }
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
    // No `finalizedBy compatibilityReporter` here — unit tests don't write ndjson,
    // and re-running the reporter on a clean dir would just regenerate an empty
    // summary.md noisily.
}

// SINGLE authoritative known-deltas matcher, shared by BOTH gates that consume the
// known-deltas files: `compatibilityReporter` (full-run suppression) and
// `compatDiffOfDiffs` (per-commit regression gate). They previously carried two
// hand-duplicated copies which silently drifted when the regex keys were added —
// any change to the matching semantics must happen HERE and nowhere else.
//
// Semantics (spec: docs/registry/api-compat-deltas.md):
//  - endpoint + category are required match keys (endpoint already encodes the
//    HTTP method as its first token, e.g. "PUT /rest/api/...").
//  - baselineValue / candidateValue / pathParams / queryParams are optional
//    exact-match keys — null/omitted means "any value on the record matches".
//    A delta that *specifies* a value requires the record to carry exactly that
//    value: a null record-side value is coerced to the empty string, so it cannot
//    match a non-null delta value. To suppress diffs where the record's value is
//    legitimately null, omit the field from the delta entry entirely.
//  - jsonPathPattern / messagePattern are optional REGEX keys (find(), not
//    full-match) for records whose identity lives inside the diff payload rather
//    than the request coordinates: jsonPathPattern matches the raw-layer jsonPath
//    (e.g. every array index of `$.components[N].distribution.docker`);
//    messagePattern matches the typed-layer AssertJ message (raw jsonPath is null
//    there; the differing field only appears as `field/property 'x.y' differ`).
//    A specified pattern REQUIRES the record field to be present and matching —
//    a null/absent record field never matches, so these keys narrow, never widen.
//    Needed for cluster-wide intentional deltas (ADR-018 base-row amendment)
//    where per-pathParams entries would explode combinatorially.
def compatMatchesDelta = { Map delta, Map record ->
    // endpoint: exact string match, OR endpointPattern: regex find(). endpointPattern exists for
    // records whose endpoint embeds a LITERAL path value (the prod-trace replayer does not
    // parameterize paths, so raw trace requests carry real component keys) — real component keys
    // must not be committed to this public repo (CI Content Validation), so such entries match the
    // path SHAPE instead of naming it. Exactly one of the two should be set; if both are, both must match.
    if (delta.endpoint != null && delta.endpoint != record.endpoint) return false
    if (delta.endpointPattern != null) {
        def ep = record.endpoint
        if (ep == null || !(ep.toString() =~ delta.endpointPattern.toString())) return false
    }
    if (delta.endpoint == null && delta.endpointPattern == null) return false // malformed entry: never matches
    if (delta.category != record.category) return false
    if (delta.baselineValue != null && delta.baselineValue.toString() != (record.baselineValue ?: '').toString()) return false
    if (delta.candidateValue != null && delta.candidateValue.toString() != (record.candidateValue ?: '').toString()) return false
    if (delta.pathParams != null && delta.pathParams != (record.pathParams ?: [:])) return false
    if (delta.queryParams != null && delta.queryParams != (record.queryParams ?: [:])) return false
    if (delta.jsonPathPattern != null) {
        def jp = record.jsonPath
        if (jp == null || !(jp.toString() =~ delta.jsonPathPattern.toString())) return false
    }
    if (delta.messagePattern != null) {
        def msg = record.message
        if (msg == null || !(msg.toString() =~ delta.messagePattern.toString())) return false
    }
    return true
}

tasks.register('compatibilityReporter') {
    group = 'verification'
    description = 'Aggregates per-worker diff/exec ndjson into summary.md and execution-log.md; fails the build if any unclassified diffs remain.'
    // Gate on the same condition as `test`. Without this, a `./gradlew build` run that
    // doesn't supply COMPAT_BASELINE_URL skips the `test` task (so no fresh ndjson is
    // written), but Gradle still runs the finalizer — which would aggregate any stale
    // ndjson left in build/reports/compat from a previous run and fail the build on
    // diffs that have nothing to do with the current code.
    onlyIf("at least one of compat.baseline.url / compat.candidate.url is set (partial config triggers explainInvalid)") { compatActivated() }
    def reportDir = layout.buildDirectory.dir('reports/compat')
    // Intentionally NOT declared as `outputs.dir(reportDir)` — id17 #3642 vs #3640
    // showed non-deterministic loss of per-worker ndjson between the `test` task
    // (writer) and `compatibilityReporter` (reader). Root cause: Gradle's
    // CleanupStaleOutputsExecuter scans declared output dirs at the START of the
    // owning task and deletes files not registered in `.gradle/buildOutputCleanup/
    // outputFiles.bin` as known outputs of any task. The per-worker ndjson is
    // produced by the `test` JVM but NOT declared as that task's output, so
    // Gradle treats it as stale and deletes it before `compatibilityReporter`
    // sees it. Removing the `outputs.dir` here deactivates stale-output cleanup
    // for reportDir — the reporter doesn't need caching/up-to-date since it's
    // already gated on `compatActivated()` and always re-aggregates.
    doLast {
        def dir = reportDir.get().asFile

        // Diagnostic mirror of [DiffCollector] and [ExecutionLogger] init
        // traces (in the test JVM). Print the SAME path representations from
        // the gradle JVM's side so the operator can grep both traces from a
        // single TC log and confirm whether the test-JVM writers and the
        // reporter reader agree on the absolute path. Added after id17 #3620
        // and #3630 both showed empty per-worker ndjson aggregation despite
        // worker counters claiming 15834 requests / 17 diffs.
        println "[compat-reporter] === compatibilityReporter doLast diagnostic ==="
        println "[compat-reporter]   reportDir.absolutePath   = ${dir.absolutePath}"
        def canonical = "(canon failed)"
        try { canonical = dir.canonicalPath } catch (Exception ignored) { /* keep placeholder */ }
        println "[compat-reporter]   reportDir.canonicalPath  = $canonical"
        println "[compat-reporter]   reportDir.exists()       = ${dir.exists()}"
        if (dir.exists()) {
            def names = (dir.listFiles() ?: []).collect { it.name }.sort()
            println "[compat-reporter]   reportDir.listFiles()    = $names"
        }
        // Walk one level up to spot a doubled-prefix path like
        // `<projectDir>/components-registry-compat-test/build/reports/compat/`
        // that the test JVM could be writing to while the reporter reads from
        // the shallow form. Print the parent dir + a bounded-depth recursive
        // find under `projectDir` for any orphan ndjson files outside the
        // reader-side dir.
        def parent = dir.parentFile
        if (parent != null) {
            println "[compat-reporter]   parent dir               = ${parent.absolutePath}"
            def parentNames = (parent.listFiles() ?: []).collect { it.name }.sort()
            println "[compat-reporter]   parent.listFiles()       = $parentNames"
        }
        // Hunt for orphan exec/diff worker ndjson files anywhere under
        // projectDir — surfaces a doubled-prefix write path or a JVM-CWD
        // mismatch in one grepable line per file. Caps the walk at depth 6
        // to keep the trace from drowning the log on a large workspace.
        def orphans = []
        def projectRoot = project.projectDir
        if (projectRoot.exists()) {
            def stack = [[projectRoot, 0] as List]
            while (!stack.isEmpty()) {
                def (f, depth) = stack.remove(stack.size() - 1)
                if (depth > 6) continue
                if (f.isDirectory()) {
                    f.listFiles()?.each { stack << ([it, depth + 1] as List) }
                } else if ((f.name.startsWith('exec-worker-') || f.name.startsWith('diff-worker-')) && f.name.endsWith('.ndjson')) {
                    if (f.parentFile?.absolutePath != dir.absolutePath) {
                        orphans << f.absolutePath
                    }
                }
            }
        }
        if (!orphans.isEmpty()) {
            println "[compat-reporter]   ORPHAN per-worker ndjson FOUND outside reportDir:"
            orphans.each { println "[compat-reporter]     $it" }
        } else {
            println "[compat-reporter]   no orphan per-worker ndjson under projectDir"
        }
        // Read marker files left by ExecutionLogger writer-init in /tmp/.
        // These bypass TC's test-suite System.out capture (which strips the
        // build-agent path prefix and obscures whether writer's absolute
        // path matches reader's). Each test JVM writes one marker per
        // workerFile lazy init.
        def tmpDir = new File("/tmp")
        // listFiles({...} as FileFilter) returns File[] (Java array). Force-coerce to a
        // Groovy List before .sort()/.isEmpty() — id17 #3640 failed mid-doLast with
        // "No signature of method: [Ljava.lang.Object;.isEmpty()" because File[] has no
        // .isEmpty() extension method.
        def markers = (tmpDir.listFiles({ f -> f.name.startsWith('compat-exec-logger-marker-') && f.name.endsWith('.txt') } as FileFilter)?.toList() ?: []).sort { it.name }
        if (markers.isEmpty()) {
            println "[compat-reporter]   /tmp marker files: none (writer init may not have fired)"
        } else {
            println "[compat-reporter]   /tmp marker files: ${markers.size()} found"
            markers.each { f ->
                println "[compat-reporter]   --- ${f.absolutePath} ---"
                f.text.eachLine { line -> println "[compat-reporter]     $line" }
            }
        }
        // Also walk /tmp looking for orphan per-worker ndjson files outside
        // both projectDir AND reportDir.
        def tmpOrphans = []
        if (tmpDir.exists()) {
            def stack2 = [[tmpDir, 0] as List]
            while (!stack2.isEmpty()) {
                def (f, depth) = stack2.remove(stack2.size() - 1)
                if (depth > 5) continue
                if (f.isDirectory()) {
                    f.listFiles()?.each { stack2 << ([it, depth + 1] as List) }
                } else if ((f.name.startsWith('exec-worker-') || f.name.startsWith('diff-worker-')) && f.name.endsWith('.ndjson')) {
                    tmpOrphans << f.absolutePath
                }
            }
        }
        if (!tmpOrphans.isEmpty()) {
            println "[compat-reporter]   ORPHAN per-worker ndjson FOUND under /tmp:"
            tmpOrphans.each { println "[compat-reporter]     $it" }
        } else {
            println "[compat-reporter]   no orphan per-worker ndjson under /tmp"
        }
        println "[compat-reporter] === /diagnostic ==="

        if (!dir.exists()) {
            return
        }
        def slurper = new groovy.json.JsonSlurper()
        // Environment categories surface at the top of summary.md regardless of count.
        // They are NOT suppressible via known-deltas — they signal that the comparison
        // itself is unsound (different snapshots, wrong service mode) and must be
        // resolved at the operator level, not papered over.
        def envCategories = ['SNAPSHOT_MISMATCH', 'CANDIDATE_NOT_DB_MODE'] as Set

        // Load the known-deltas file. Each entry suppresses matching diffs from the
        // "Endpoint divergences" section into a separate "Suppressed (known deltas)"
        // section, with the entry's reason + regressionTest fields surfaced for review.
        // Spec: docs/registry/api-compat-deltas.md
        //
        // -Pcompat.known-deltas (or COMPAT_KNOWN_DELTAS) selects the per-mode file:
        //   known-deltas-db.json  (default) — migrated candidate routed through the DB resolver
        //   known-deltas-git.json — no-migration candidate served entirely from Git (intentionally empty)
        def knownDeltasName = project.findProperty('compat.known-deltas') ?: System.getenv('COMPAT_KNOWN_DELTAS') ?: 'known-deltas-db.json'
        def knownDeltasFile = file("src/test/resources/${knownDeltasName}")
        def knownDeltas = []
        if (knownDeltasFile.exists()) {
            try {
                def parsed = slurper.parseText(knownDeltasFile.text)
                knownDeltas = (parsed?.deltas as List) ?: []
            } catch (Exception e) {
                logger.warn("[compat] failed to parse ${knownDeltasName}: ${e.message}; treating as empty")
            }
        } else {
            logger.warn("[compat] known-deltas file not found: ${knownDeltasFile}; treating as empty")
        }
        // Shared matcher — see `compatMatchesDelta` above the task registrations
        // (single source of truth for BOTH this reporter and compatDiffOfDiffs).
        def findDeltaFor = { Map record ->
            knownDeltas.find { delta -> compatMatchesDelta(delta as Map, record) }
        }

        def diffFiles = dir.listFiles({ f -> f.name.startsWith('diff-worker-') && f.name.endsWith('.ndjson') } as FileFilter) ?: []
        def execFiles = dir.listFiles({ f -> f.name.startsWith('exec-worker-') && f.name.endsWith('.ndjson') } as FileFilter) ?: []
        // INFRA-WORKAROUND: id17 #3642 confirmed that the per-worker ndjson files
        // are non-deterministically removed between the test JVM's shutdown hook
        // (which prints "persisted to ...ndjson") and this doLast. ExecutionLogger /
        // DiffCollector now copy each worker file to /tmp/crs-compat-backup/ at JVM-
        // shutdown — fall back to that location when reportDir is empty so the
        // build doesn't fail with the proof-of-execution guard ("0 cases executed")
        // when the writer actually ran (15834 cases per the test JVM counter).
        // Restore both ndjson kinds AND any summary/execution-log artefacts so
        // existing TC artifactRules pick them up from build/reports/compat.
        if ((diffFiles.size() + execFiles.size()) == 0) {
            def backupDir = new File("${System.getProperty('java.io.tmpdir')}/crs-compat-backup")
            if (backupDir.exists()) {
                def restored = []
                backupDir.listFiles({ f -> (f.name.startsWith('diff-worker-') || f.name.startsWith('exec-worker-')) && f.name.endsWith('.ndjson') } as FileFilter)?.each { src ->
                    def target = new File(dir, src.name)
                    java.nio.file.Files.copy(src.toPath(), target.toPath(), java.nio.file.StandardCopyOption.REPLACE_EXISTING)
                    restored << src.name
                }
                if (!restored.isEmpty()) {
                    println "[compat-reporter] reportDir was empty; restored ${restored.size()} per-worker file(s) from ${backupDir.absolutePath}: ${restored}"
                    diffFiles = dir.listFiles({ f -> f.name.startsWith('diff-worker-') && f.name.endsWith('.ndjson') } as FileFilter) ?: []
                    execFiles = dir.listFiles({ f -> f.name.startsWith('exec-worker-') && f.name.endsWith('.ndjson') } as FileFilter) ?: []
                }
            }
        }
        def summary = new File(dir, 'summary.md')
        def execMd = new File(dir, 'execution-log.md')
        def execNd = new File(dir, 'execution-log.ndjson')

        def diffsByCategory = [:].withDefault { [] }
        diffFiles.each { f ->
            f.eachLine('UTF-8') { line ->
                def trimmed = line.trim()
                if (trimmed.isEmpty()) return
                def rec = null
                try { rec = slurper.parseText(trimmed) } catch (Exception ignored) {}
                def categoryKey = (rec?.category ?: 'UNKNOWN').toString()
                diffsByCategory[categoryKey] << (rec ?: [raw: trimmed])
            }
        }
        def envDiffs = diffsByCategory.findAll { k, _ -> envCategories.contains(k) }
        def nonEnvDiffs = diffsByCategory.findAll { k, _ -> !envCategories.contains(k) }

        // Partition non-env diffs into suppressed (matched known-delta) and active.
        // Each suppressed record is augmented with .matchedDelta for reporting.
        def suppressedByCategory = [:].withDefault { [] }
        def activeByCategory = [:].withDefault { [] }
        nonEnvDiffs.each { cat, recs ->
            recs.each { rec ->
                def delta = findDeltaFor(rec as Map)
                if (delta != null) {
                    suppressedByCategory[cat] << (rec + [matchedDelta: delta])
                } else {
                    activeByCategory[cat] << rec
                }
            }
        }
        def envTotal = envDiffs.values().sum { it.size() } ?: 0
        def suppressedTotal = suppressedByCategory.values().sum { it.size() } ?: 0
        def activeRegularTotal = activeByCategory.values().sum { it.size() } ?: 0
        def activeTotal = envTotal + activeRegularTotal
        def totalDiffs = envTotal + suppressedTotal + activeRegularTotal

        def mdEscape = { Object v ->
            (v == null ? '' : v.toString()).replace('|', '\\|').replace('\n', ' ').replace('\r', ' ')
        }
        def truncate = { Object v, int max ->
            def s = v == null ? '' : v.toString()
            s.length() > max ? s.substring(0, max) + '…' : s
        }
        def renderParams = { Map params ->
            if (params == null || params.isEmpty()) return ''
            params.collect { k, v -> "${k}=${v}" }.join('; ')
        }
        def renderTable = { List<Map> recs, StringBuilder out ->
            out << "| Endpoint | Entity | Params | Layer | Detail | Baseline | Candidate |\n"
            out << "|---|---|---|---|---|---|---|\n"
            recs.each { r ->
                def detail = r.message ?: ''
                out << '| ' << mdEscape(r.endpoint) <<
                    ' | ' << mdEscape(r.entityKey ?: '') <<
                    ' | ' << mdEscape(renderParams(r.pathParams as Map ?: [:] as Map)) <<
                    ' | ' << mdEscape(r.layer) <<
                    ' | ' << mdEscape(truncate(detail, 800)) <<
                    ' | ' << mdEscape(truncate(r.baselineValue, 120)) <<
                    ' | ' << mdEscape(truncate(r.candidateValue, 120)) <<
                    ' |\n'
            }
        }
        def clusterKeyFor = { Map r ->
            def endpoint = (r.endpoint ?: '').toString()
            def entity = (r.entityKey ?: renderParams(r.pathParams as Map ?: [:] as Map) ?: '-').toString()
            def field = (r.message ?: '').toString().replaceAll(/\$\[\d+\]/, '\\$[N]')
            "${endpoint} | ${entity} | ${field}"
        }
        def buildClusterDigest = { Map activeCats ->
            def counts = [:].withDefault { 0 }
            activeCats.each { cat, recs ->
                recs.each { rec ->
                    counts[clusterKeyFor(rec as Map)]++
                }
            }
            counts.sort { -it.value }
        }
        def renderSuppressedTable = { List<Map> recs, StringBuilder out ->
            out << "| Endpoint | Params | Layer | Baseline | Candidate | Reason | Regression Test |\n"
            out << "|---|---|---|---|---|---|---|\n"
            recs.each { r ->
                def delta = (r.matchedDelta as Map) ?: [:]
                out << '| ' << mdEscape(r.endpoint) <<
                    ' | ' << mdEscape(renderParams(r.pathParams as Map ?: [:] as Map)) <<
                    ' | ' << mdEscape(r.layer) <<
                    ' | ' << mdEscape(truncate(r.baselineValue, 60)) <<
                    ' | ' << mdEscape(truncate(r.candidateValue, 60)) <<
                    ' | ' << mdEscape(truncate(delta.reason, 200)) <<
                    ' | ' << mdEscape(delta.regressionTest) <<
                    ' |\n'
            }
        }

        def sb = new StringBuilder()
        sb << "# Compatibility Run Summary\n\n"
        sb << "Generated: ${new Date().format("yyyy-MM-dd HH:mm:ss Z")}\n\n"
        sb << "- Total recorded diffs: **${totalDiffs}**\n"
        sb << "- Environment / precondition: ${envTotal}\n"
        sb << "- Suppressed (known deltas): ${suppressedTotal}\n"
        sb << "- Active endpoint divergences: ${activeRegularTotal}\n\n"

        if (!envDiffs.isEmpty()) {
            sb << "## ⚠ Environment / precondition warnings\n\n"
            sb << "These appear *before* endpoint diffs because they may explain or invalidate downstream divergences. Not suppressible via known-deltas.\n\n"
            envDiffs.each { cat, recs ->
                sb << "### ${cat} (${recs.size()})\n\n"
                renderTable(recs as List<Map>, sb)
                sb << "\n"
            }
        }

        if (!suppressedByCategory.isEmpty()) {
            sb << "## Suppressed (known deltas)\n\n"
            sb << "Diffs matched by entries in `src/test/resources/${knownDeltasName}`. Each has a regression test pinning the intended behavior.\n\n"
            suppressedByCategory.each { cat, recs ->
                sb << "### ${cat} (${recs.size()})\n\n"
                renderSuppressedTable(recs as List<Map>, sb)
                sb << "\n"
            }
        }

        if (!activeByCategory.isEmpty()) {
            def clusterCounts = buildClusterDigest(activeByCategory)
            if (!clusterCounts.isEmpty()) {
                sb << "## Active diff cluster digest\n\n"
                sb << "Grouped by endpoint + resolved entity + normalised field path (`\$[N]` = any array index). "
                sb << "Use this to triage jira-ranges residuals without decoding raw indices.\n\n"
                sb << "| Count | Cluster |\n"
                sb << "|---:|---|\n"
                clusterCounts.each { key, count ->
                    sb << "| ${count} | ${mdEscape(key)} |\n"
                }
                sb << "\n"
            }
            sb << "## Endpoint divergences\n\n"
            activeByCategory.each { cat, recs ->
                sb << "### ${cat} (${recs.size()})\n\n"
                def shown = recs.take(50)
                renderTable(shown as List<Map>, sb)
                if (recs.size() > 50) sb << "\n_…and ${recs.size() - 50} more (see diff-worker-*.ndjson for full records)._\n"
                sb << "\n"
            }
            sb << "\n_Long `Detail` cells are truncated to 800 chars in the table above. Full text is in diff-worker-\\*.ndjson._\n"
        }
        if (totalDiffs == 0) {
            sb << "_No diffs recorded — clean compat run._\n"
        }
        summary.text = sb.toString()

        def clusterMd = new File(dir, 'cluster-digest.md')
        if (!activeByCategory.isEmpty()) {
            def clusterCounts = buildClusterDigest(activeByCategory)
            def csb = new StringBuilder()
            csb << "# Compat Cluster Digest\n\n"
            csb << "Generated: ${new Date().format("yyyy-MM-dd HH:mm:ss Z")}\n\n"
            csb << "- Active endpoint divergences: ${activeRegularTotal}\n"
            csb << "- Distinct clusters: ${clusterCounts.size()}\n\n"
            csb << "| Count | Endpoint | Entity | Field |\n"
            csb << "|---:|---|---|---|\n"
            clusterCounts.each { key, count ->
                def parts = key.toString().split(' \\| ', 3)
                def endpoint = parts.length > 0 ? parts[0] : key
                def entity = parts.length > 1 ? parts[1] : ''
                def field = parts.length > 2 ? parts[2] : ''
                csb << "| ${count} | ${mdEscape(endpoint)} | ${mdEscape(entity)} | ${mdEscape(field)} |\n"
            }
            clusterMd.text = csb.toString()
        } else {
            clusterMd.text = "# Compat Cluster Digest\n\n_No active endpoint divergences._\n"
        }

        execNd.withWriter('UTF-8') { w ->
            execFiles.each { f -> f.eachLine('UTF-8') { line -> w.writeLine(line) } }
        }
        def total = 0
        def withDiffs = 0
        execFiles.each { f -> f.eachLine('UTF-8') { line -> total++; if (line.contains('"diffCount":') && !line.contains('"diffCount":0')) withDiffs++ } }
        execMd.text = """# Compatibility Execution Log

Generated: ${new Date().format("yyyy-MM-dd HH:mm:ss Z")}

- Total test cases executed: ${total}
- Cases with diffs: ${withDiffs}
- Cases clean: ${total - withDiffs}

Raw per-line records: `execution-log.ndjson`
"""
        logger.lifecycle("[compat] ${suppressedTotal} suppressed via known-deltas, ${activeTotal} active diffs (${envTotal} env-warnings)")
        logger.lifecycle("[compat] ${total} execution-log entries (${withDiffs} with diffs, ${total - withDiffs} clean)")

        // TeamCity service messages (https://www.jetbrains.com/help/teamcity/service-messages.html):
        // surface the compat numbers in TC's build status line / problems tab so an
        // operator scanning the build dashboard sees the diff count without opening
        // summary.md. {build.status.text} keeps TC's auto-generated test-count
        // prefix ("Tests passed: N, ignored: M"), we append our own.
        def statusBody = "compat: ${activeTotal} active diff(s)" +
            " (${suppressedTotal} suppressed, ${envTotal} env), " +
            "${total} cases executed"
        // Escape `'`, `[`, `]`, `|`, `\n` per the service-message escaping rules.
        def escape = { String s -> s
            .replace('|', '||')
            .replace("'", "|'")
            .replace('\n', '|n')
            .replace('\r', '|r')
            .replace('[', '|[')
            .replace(']', '|]')
        }
        println "##teamcity[buildStatus text='{build.status.text}; ${escape(statusBody)}']"
        if (activeTotal > 0) {
            // buildProblem surfaces in the build's Problems tab and tags the
            // build as having a real failure category, separate from the
            // gradle-task-failed default classification. The "Compat:"
            // prefix is kept (re-added in this PR after #293 dropped it):
            // user reported the red status info disappeared on the next
            // build after that drop — TC may classify or dedupe problems
            // by description-hash and need a stable identifying prefix.
            // Cosmetic doubling ("compat: compat:" in the displayed line)
            // is the lesser cost vs losing the typed problem entirely.
            println "##teamcity[buildProblem description='Compat: ${escape(statusBody)} — see summary.md']"
        }

        // Proof-of-execution guard: a green build with zero exec records means
        // the wrapper booted both stands but no compareResponses → ExecutionLogger
        // path ever ran (smoke component set didn't intersect, all tests
        // skipped via assumeTrue, or compat URLs weren't passed through to the
        // base class). Without this guard, "Tests passed: 93" with all-skip
        // looks identical to a real clean sweep. Fail loudly so the operator
        // KNOWS the old-vs-new comparison was actually exercised.
        if (total == 0) {
            throw new GradleException(
                "Compatibility run logged ZERO execution cases — both stands came up but " +
                "no per-endpoint comparison ran. Likely causes: smoke list didn't intersect " +
                "with components baseline V1 resolves; -Pcompat.baseline.url / -Pcompat.candidate.url " +
                "not threaded through to CompatibilityTestBase; or every test class skipped via " +
                "assumeTrue. Verify build/reports/compat/exec-worker-*.ndjson exists and is non-empty " +
                "before trusting the 'Tests passed: N' line."
            )
        }

        if (activeTotal > 0) {
            throw new GradleException(
                "Compatibility run produced ${activeTotal} active divergence(s) " +
                "(${envTotal} env-warnings + ${activeRegularTotal} unsuppressed endpoint diffs; " +
                "${suppressedTotal} suppressed via known-deltas). See ${summary.toPath()}."
            )
        }
    }
}

// Diff-of-diffs regression gate for the compat burndown: compares the CURRENT
// run's diff set against a FROZEN baseline diff set (both: dirs of
// diff-worker-*.ndjson) and classifies every diff key as FIXED / REMAINING /
// NEW. NEW > 0 fails the task — a fix may only land when it introduces zero
// new diffs anywhere in the sweep. The frozen baseline lives OUTSIDE the repo
// (production-derived data); see scripts/local-stands/diff-of-diffs.sh.
//
// Key = (endpoint | pathParams | queryParams | category | entityKey |
//        normalized jsonPath | baselineValue | candidateValue), where the
// normalized jsonPath collapses positional indices ([12] -> [N]) so array
// reordering between runs does not break identity. Records matching a
// known-deltas entry (same selection as compatibilityReporter) are excluded
// on BOTH sides — an intentional, documented delta is not a regression.
// Env-warning records (SNAPSHOT_MISMATCH / CANDIDATE_NOT_DB_MODE) on EITHER
// side abort the comparison: the underlying run is unsound and must not be
// used as evidence.
tasks.register('compatDiffOfDiffs') {
    group = 'verification'
    description = 'Compares a current compat run against a frozen baseline diff set; fails on NEW diffs.'
    doLast {
        def slurper = new groovy.json.JsonSlurper()
        def envCategories = ['SNAPSHOT_MISMATCH', 'CANDIDATE_NOT_DB_MODE'] as Set

        def baselineDirProp = project.findProperty('compat.dod.baseline-dir') ?: System.getenv('COMPAT_DOD_BASELINE_DIR')
        def currentDirProp = project.findProperty('compat.dod.current-dir') ?: System.getenv('COMPAT_DOD_CURRENT_DIR') ?: layout.buildDirectory.dir('reports/compat').get().asFile.absolutePath
        if (baselineDirProp == null || baselineDirProp.toString().isBlank()) {
            throw new GradleException("compat.dod.baseline-dir (or COMPAT_DOD_BASELINE_DIR) must point at the frozen baseline report dir")
        }
        def baselineDir = new File(baselineDirProp.toString())
        def currentDir = new File(currentDirProp.toString())
        if (!baselineDir.isDirectory()) throw new GradleException("baseline dir not found: ${baselineDir}")
        if (!currentDir.isDirectory()) throw new GradleException("current dir not found: ${currentDir}")

        // Same known-deltas selection as compatibilityReporter.
        def knownDeltasName = project.findProperty('compat.known-deltas') ?: System.getenv('COMPAT_KNOWN_DELTAS') ?: 'known-deltas-db.json'
        def knownDeltasFile = file("src/test/resources/${knownDeltasName}")
        def knownDeltas = []
        if (knownDeltasFile.exists()) {
            try {
                def parsed = slurper.parseText(knownDeltasFile.text)
                knownDeltas = (parsed?.deltas as List) ?: []
            } catch (Exception e) {
                logger.warn("[compat-dod] failed to parse ${knownDeltasName}: ${e.message}; treating as empty")
            }
        }
        // Shared matcher — see `compatMatchesDelta` above the task registrations. This task
        // previously carried a hand-duplicated copy that silently drifted (it missed the
        // jsonPathPattern/messagePattern keys), so ADR-018-amendment entries were excluded by
        // the reporter but NOT by this gate. One definition, both gates.
        def matchesDelta = { Map delta, Map record -> compatMatchesDelta(delta, record) }

        def loadRecords = { File dir, String label ->
            // No diff-worker-*.ndjson means ZERO diffs: DiffCollector only
            // creates a worker file on its first recorded diff, so a fully-clean
            // run (the burndown's end state — 0 active) legitimately writes none.
            // The run-DID-execute guarantee comes from the exec-worker
            // completeness guard run earlier (countExecCases), NOT from the
            // presence of a diff file — so a missing diff file here is an empty
            // diff set, not an error.
            def files = dir.listFiles({ f -> f.name.startsWith('diff-worker-') && f.name.endsWith('.ndjson') } as FileFilter) ?: []
            def records = []
            files.each { f ->
                f.eachLine('UTF-8') { line ->
                    def trimmed = line.trim()
                    if (trimmed.isEmpty()) return
                    def rec = null
                    try { rec = slurper.parseText(trimmed) } catch (Exception ignored) { }
                    if (rec != null) records << rec
                }
            }
            def envRecs = records.findAll { envCategories.contains((it.category ?: '').toString()) }
            if (!envRecs.isEmpty()) {
                throw new GradleException("[compat-dod] ${label} run carries ${envRecs.size()} env-warning record(s) (${envRecs.collect { it.category }.unique()}) — the run is unsound (snapshot/mode mismatch); re-run it before comparing")
            }
            def suppressed = 0
            def active = records.findAll { rec ->
                def hit = knownDeltas.find { delta -> matchesDelta(delta as Map, rec as Map) }
                if (hit != null) suppressed++
                hit == null
            }
            println "[compat-dod] ${label}: ${records.size()} records (${suppressed} suppressed via ${knownDeltasName}) from ${files.size()} worker file(s) in ${dir}"
            active
        }

        def renderParams = { Map params ->
            if (params == null || params.isEmpty()) return ''
            params.sort().collect { k, v -> "${k}=${v}" }.join('&')
        }
        def normIndices = { String s -> s == null ? '' : s.replaceAll(/\[\d+\]/, '[N]') }
        def keyOf = { Map r ->
            // jsonPath is the structured location (new records); legacy records
            // fall back to the message (normalised + truncated). EXCEPTION:
            // typed-layer VALUE_DIFF messages are full AssertJ dumps whose
            // leading content is the (unordered) actual collection — the same
            // real diff produces a DIFFERENT dump head every run, so keying on
            // it makes a stable diff oscillate FIXED+NEW between runs (observed
            // on the common jira-ranges typed compare). Key those records on
            // endpoint+params+category alone — conservative: distinct VALUE_DIFFs
            // on one endpoint merge into one key, but a NEW one still surfaces
            // when the endpoint was previously clean.
            def loc =
                (r.category ?: '').toString() == 'VALUE_DIFF' && r.jsonPath == null
                    ? ''
                    : (r.jsonPath ?: r.message ?: '').toString()
            if (loc.length() > 400) loc = loc.substring(0, 400)
            [
                (r.endpoint ?: '').toString(),
                renderParams(r.pathParams as Map),
                renderParams(r.queryParams as Map),
                (r.category ?: '').toString(),
                (r.entityKey ?: '').toString(),
                normIndices(loc),
                normIndices((r.baselineValue ?: '').toString()),
                normIndices((r.candidateValue ?: '').toString()),
            ].join(' | ')
        }

        // Completeness guard (adversarial-review SHOULD-FIX): a run that crashed
        // mid-way still leaves >=1 flushed diff-worker file, and its MISSING diffs
        // would read as FIXED -> a truncated run fakes a green gate. Compare the
        // executed-case volume (exec-worker-*.ndjson lines) against the baseline:
        // a current run below 95% of the baseline's case count is not evidence.
        def countExecCases = { File dir, String label ->
            def files = dir.listFiles({ f -> f.name.startsWith('exec-worker-') && f.name.endsWith('.ndjson') } as FileFilter) ?: []
            if (files.size() == 0) {
                throw new GradleException("[compat-dod] no exec-worker-*.ndjson in ${label} dir ${dir} — cannot prove the run completed; refusing to compare")
            }
            long cases = 0
            files.each { f -> f.eachLine('UTF-8') { line -> if (!line.trim().isEmpty()) cases++ } }
            cases
        }
        def baselineCases = countExecCases(baselineDir, 'baseline')
        def currentCases = countExecCases(currentDir, 'current')
        println "[compat-dod] executed cases: baseline=${baselineCases} current=${currentCases}"
        if (currentCases < (long) (baselineCases * 0.95)) {
            throw new GradleException(
                "[compat-dod] current run executed only ${currentCases} cases vs baseline ${baselineCases} " +
                "(<95%) — looks truncated/partial; its missing diffs would fake FIXED. Re-run before comparing."
            )
        }

        def baselineRecords = loadRecords(baselineDir, 'baseline')
        def currentRecords = loadRecords(currentDir, 'current')
        def baselineKeys = baselineRecords.collect { keyOf(it as Map) } as Set
        def currentByKey = [:]
        currentRecords.each { rec -> currentByKey[keyOf(rec as Map)] = rec }
        def currentKeys = currentByKey.keySet()

        def fixed = (baselineKeys - currentKeys).sort()
        def remaining = baselineKeys.intersect(currentKeys).sort()
        def newKeys = (currentKeys - baselineKeys).sort()

        def out = new StringBuilder()
        out << "# Diff-of-diffs\n\n"
        out << "- Baseline: ${baselineDir} (${baselineKeys.size()} unique keys)\n"
        out << "- Current:  ${currentDir} (${currentKeys.size()} unique keys)\n\n"
        out << "| Verdict | Count |\n|---|---:|\n"
        out << "| FIXED | ${fixed.size()} |\n| REMAINING | ${remaining.size()} |\n| NEW | ${newKeys.size()} |\n\n"
        def renderKeys = { String title, List keys ->
            if (keys.isEmpty()) return
            out << "## ${title} (${keys.size()})\n\n"
            keys.each { k -> out << "- `${k}`\n" }
            out << "\n"
        }
        renderKeys('FIXED', fixed)
        renderKeys('REMAINING', remaining)
        renderKeys('NEW', newKeys)
        def reportFile = new File(currentDir, 'diff-of-diffs.md')
        reportFile.setText(out.toString(), 'UTF-8')

        println "[compat-dod] FIXED=${fixed.size()} REMAINING=${remaining.size()} NEW=${newKeys.size()} -> ${reportFile}"
        if (!newKeys.isEmpty()) {
            // Group NEW by entityKey (6th key segment is the normalised path;
            // 5th is entityKey) for fast triage in the console.
            def byEntity = newKeys.groupBy { k -> k.split(/ \| /, -1)[4] ?: '-' }
            byEntity.sort { -it.value.size() }.each { entity, ks ->
                println "[compat-dod] NEW x${ks.size()} entity='${entity ?: '-'}'"
                ks.take(5).each { println "[compat-dod]    ${it}" }
                if (ks.size() > 5) println "[compat-dod]    ... and ${ks.size() - 5} more"
            }
            throw new GradleException(
                "diff-of-diffs: ${newKeys.size()} NEW diff key(s) vs the frozen baseline — the change " +
                "regresses previously-clean entities. Revert/narrow the fix; full list in ${reportFile}."
            )
        }
    }
}
