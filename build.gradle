import com.platformlib.plugins.gradle.wrapper.task.DockerTask
import groovy.json.JsonOutput

buildscript {
    dependencies {
        classpath "com.avast.gradle:gradle-docker-compose-plugin:0.17.8"
    }
}

plugins {
    id 'io.github.gradle-nexus.publish-plugin'
    id 'org.octopusden.octopus-release-management'
    id 'jacoco'
    id 'org.springframework.boot'                 apply false
    id 'org.jetbrains.kotlin.jvm'                 apply false
    id 'org.jetbrains.kotlin.plugin.spring'       apply false
    id 'org.jetbrains.kotlin.plugin.jpa'          apply false
    id 'io.gitlab.arturbosch.detekt'              apply false
    id 'org.jlleitschuh.gradle.ktlint'            apply false
    id 'signing'
    id 'org.asciidoctor.jvm.convert' version '3.3.2'
    id 'com.platformlib.gradle-wrapper' version '0.2.6'
}

def adocProperties = [:]
['header', 'glossary-component-link', 'components-registry-link', 'release-management-automation-link',
 'escrow-automation-tool-link', 'service-desk-link', 'components-registry-validation-link'].each {
    (project.findProperty("adoc.$it") as String)?.with { property -> adocProperties[it] = property }
}

def checkMandatoryAdocProperties = {
    ['glossary-component-link', 'components-registry-link', 'release-management-automation-link',
     'escrow-automation-tool-link', 'service-desk-link', 'components-registry-validation-link'].each {
        if (adocProperties[it] == null) throw new IllegalArgumentException("`adoc.$it` property must be defined")
    }
    return
}

def wikiProperties = [:]
['url', 'username', 'password', 'space-key', 'page-id'].each {
    (project.findProperty("wiki.$it") as String)?.with { property -> wikiProperties[it] = property }
}

def checkMandatoryWikiProperties = {
    ['url', 'username', 'password', 'space-key', 'page-id'].each {
        if (wikiProperties[it] == null) throw new IllegalArgumentException("`wiki.$it` property must be defined")
    }
    return
}

asciidoctorj {
    attributes adocProperties
}

asciidoctor {
    sourceDir file('docs')
    sources {
        include 'configuration.adoc'
    }
    outputDir file('build/docs')
}

tasks.asciidoctor.doFirst {
    checkMandatoryAdocProperties.run()
}

tasks.register('adocPublishToWiki', DockerTask) {
    doFirst {
        if (project.findProperty('docker.registry') == null) throw new IllegalArgumentException("`docker.registry` property must be defined")
        checkMandatoryWikiProperties.run()
        checkMandatoryAdocProperties.run()
    }
    image = "${project.findProperty('docker.registry')}/confluencepublisher/confluence-publisher:0.22.0"
    dockerOptions = ['--network', 'host']
    bindMounts = ["${file('docs')}:/var/asciidoc-root-folder"]
    env = ["ROOT_CONFLUENCE_URL"    : wikiProperties['url'],
           "SKIP_SSL_VERIFICATION"  : "true",
           "MAX_REQUESTS_PER_SECOND": "10",
           "USERNAME"               : wikiProperties['username'],
           "PASSWORD"               : wikiProperties['password'],
           "SPACE_KEY"              : wikiProperties['space-key'],
           "ANCESTOR_ID"            : wikiProperties['page-id'],
           "PUBLISHING_STRATEGY"    : "REPLACE_ANCESTOR",
           "ORPHAN_REMOVAL_STRATEGY": "KEEP_ORPHANS",
           "ATTRIBUTES"             : JsonOutput.toJson(adocProperties),
           "NOTIFY_WATCHERS"        : "false",
           "CONVERT_ONLY"           : "false"
    ]
}

if (project.hasProperty("nexus")) {
    nexusPublishing {
        repositories {
            sonatype {
                nexusUrl.set(uri("https://ossrh-staging-api.central.sonatype.com/service/local/"))
                snapshotRepositoryUrl.set(uri("https://central.sonatype.com/repository/maven-snapshots/"))
                username.set(System.getenv("MAVEN_USERNAME"))
                password.set(System.getenv("MAVEN_PASSWORD"))
            }
        }
    }
}

allprojects {
    group = 'org.octopusden.octopus.infrastructure'
}

def qualityFailOnViolation = { String propertyName, boolean defaultValue ->
    def value = findProperty(propertyName)?.toString()
    if (value == null) {
        return defaultValue
    }
    value.toBoolean()
}

def javaQualityFailOnViolation = qualityFailOnViolation('quality.java.failOnViolation', true)
def groovyQualityFailOnViolation = qualityFailOnViolation('quality.groovy.failOnViolation', false)
def kotlinQualityFailOnViolation = qualityFailOnViolation('quality.kotlin.failOnViolation', true)
def perModuleCoverageMinimum = (findProperty('quality.coverage.perModule.minimum')?.toString()?.toBigDecimal()) ?: 0.10
def overallCoverageMinimum = (findProperty('quality.coverage.overall.minimum')?.toString()?.toBigDecimal()) ?: 0.70
def qualityCoverageProjects = {
    subprojects.findAll {
        !['components-registry-automation', 'test-common'].contains(it.name)
    }
}

subprojects {
    repositories {
        mavenLocal()
        mavenCentral()
        maven {
            url = uri("https://repo.gradle.org/gradle/libs-releases-local")
        }
        maven {
            url = uri("https://oss.sonatype.org/content/repositories/releases/")
        }
    }
}

configure(subprojects) {
    apply plugin: 'signing'
    apply plugin: 'idea'
    apply plugin: 'java-library'
    apply plugin: 'jacoco'
    apply plugin: 'checkstyle'
    apply plugin: 'pmd'
    apply plugin: 'org.jetbrains.kotlin.jvm'
    apply plugin: 'maven-publish'

    configurations.matching { cfg ->
        cfg?.name?.toLowerCase()?.contains('test')
    }.all { cfg ->
        cfg.exclude group: 'org.jetbrains.kotlin', module: 'kotlin-main-kts'
    }

    dependencies {
        api "org.jetbrains.kotlin:kotlin-stdlib"
        implementation "org.jetbrains.kotlin:kotlin-reflect"
        implementation platform("org.jetbrains.kotlin:kotlin-bom:${project['kotlin.version']}")
        implementation platform("com.fasterxml.jackson:jackson-bom:${project['jackson.version']}")
        testImplementation platform("org.junit:junit-bom:${project['junit-jupiter.version']}")
        testImplementation "org.jetbrains.kotlin:kotlin-test-junit5"
        testImplementation "org.junit.jupiter:junit-jupiter-engine"
        testImplementation "org.junit.jupiter:junit-jupiter-params"
        testImplementation "junit:junit:4.12"
        testRuntimeOnly "org.junit.vintage:junit-vintage-engine"
    }

    checkstyle {
        toolVersion = '10.17.0'
        configFile = rootProject.file('config/checkstyle/checkstyle.xml')
        ignoreFailures = !javaQualityFailOnViolation
        showViolations = true
    }

    pmd {
        toolVersion = '6.55.0'
        consoleOutput = true
        incrementalAnalysis = true
        ignoreFailures = !javaQualityFailOnViolation
        ruleSets = []
        ruleSetFiles = files(rootProject.file('config/pmd/ruleset.xml'))
    }

    if (file("$projectDir/src/main/groovy").exists() || file("$projectDir/src/test/groovy").exists()) {
        apply plugin: 'codenarc'
        codenarc {
            configFile = rootProject.file('config/codenarc/codenarc.groovy')
            ignoreFailures = !groovyQualityFailOnViolation
        }
    }

    if (
            file("$projectDir/src/main/kotlin").exists() ||
            file("$projectDir/src/test/kotlin").exists() ||
            file("$projectDir/src/integrationTest/kotlin").exists() ||
            file("$projectDir/src/testFixtures/kotlin").exists()
    ) {
        apply plugin: 'io.gitlab.arturbosch.detekt'
        apply plugin: 'org.jlleitschuh.gradle.ktlint'

        detekt {
            buildUponDefaultConfig = true
            allRules = false
            config.setFrom(rootProject.file('config/detekt/detekt.yml'))
            baseline = file("$projectDir/detekt-baseline.xml")
            ignoreFailures = !kotlinQualityFailOnViolation
        }

        tasks.withType(io.gitlab.arturbosch.detekt.Detekt).configureEach {
            reports {
                xml.required.set(true)
                html.required.set(true)
                sarif.required.set(true)
                txt.required.set(false)
            }
        }

        ktlint {
            ignoreFailures.set(!kotlinQualityFailOnViolation)
            outputToConsole.set(true)
            reporters {
                reporter org.jlleitschuh.gradle.ktlint.reporter.ReporterType.PLAIN
                reporter org.jlleitschuh.gradle.ktlint.reporter.ReporterType.CHECKSTYLE
            }
            baseline.set(file("$projectDir/ktlint-baseline.xml"))
            filter {
                exclude("**/generated/**")
                exclude("**/build/**")
                include("**/src/**/*.kt")
            }
        }

        tasks.matching {
            it.name == 'runKtlintCheckOverKotlinScripts' ||
                    it.name == 'ktlintKotlinScriptCheck' ||
                    it.name == 'runKtlintFormatOverKotlinScripts' ||
                    it.name == 'ktlintKotlinScriptFormat'
        }.configureEach {
            enabled = false
        }
    }

    tasks.withType(org.gradle.api.plugins.quality.Checkstyle).configureEach {
        reports {
            xml.required = true
            html.required = true
        }
    }

    tasks.withType(org.gradle.api.plugins.quality.Pmd).configureEach {
        reports {
            xml.required = true
            html.required = true
        }
    }

    tasks.withType(org.gradle.api.plugins.quality.CodeNarc).configureEach {
        reports {
            xml.required = true
            html.required = true
        }
    }

    compileKotlin {
        kotlinOptions.jvmTarget = "21"
    }

    compileTestKotlin {
        kotlinOptions.jvmTarget = "21"
    }

    sourceCompatibility = 21
    targetCompatibility = 21

    test {
        useJUnitPlatform()
        systemProperties = [
                //NOTE: when parallel.enabled = true EscrowConfigurationLoaderTest + BuildToolResolverTest
                // can fail sporadically on GH
            'junit.jupiter.execution.parallel.enabled': false
        ]
        jvmArgs('--add-opens=java.base/java.lang=ALL-UNNAMED')
        jvmArgs('--add-opens=java.base/java.util=ALL-UNNAMED')
        finalizedBy(tasks.named('jacocoTestReport'))
    }

    jacocoTestReport {
        dependsOn(test)
        reports {
            xml.required = true
            html.required = true
        }
    }

    jacocoTestCoverageVerification {
        dependsOn(test)
        violationRules {
            rule {
                element = 'BUNDLE'
                limit {
                    counter = 'LINE'
                    value = 'COVEREDRATIO'
                    minimum = perModuleCoverageMinimum
                }
            }
        }
    }

    java {
        withJavadocJar()
        withSourcesJar()
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                from components.java
                pom {
                    name.set(project.name)
                    description.set("Octopus module: ${project.name}")
                    url.set("https://github.com/octopusden/octopus-components-registry-service.git")
                    licenses {
                        license {
                            name.set("The Apache License, Version 2.0")
                            url.set("http://www.apache.org/licenses/LICENSE-2.0.txt")
                        }
                    }
                    scm {
                        url.set("https://github.com/octopusden/octopus-components-registry-service.git")
                        connection.set("scm:git://github.com/octopusden/octopus-components-registry-service.git")
                    }
                    developers {
                        developer {
                            id.set("octopus")
                            name.set("octopus")
                        }
                    }
                }
            }
        }
    }

    signing {
        required(gradle.taskGraph.hasTask("publishToSonatype"))
        sign(publishing.publications)
        def signingKey = findProperty("signingKey")
        def signingPassword = findProperty("signingPassword")
        useInMemoryPgpKeys(
                signingKey,
                signingPassword
        )
    }
}

tasks.register('qualityStatic') {
    group = 'verification'
    description = 'Runs static analysis and compile-time checks for CI quality gate'
    def groovyProjects = subprojects.findAll { project ->
        file("${project.projectDir}/src/main/groovy").exists() || file("${project.projectDir}/src/test/groovy").exists()
    }
    def integrationTestProjects = subprojects.findAll { project ->
        file("${project.projectDir}/src/integrationTest").exists()
    }
    def kotlinProjects = subprojects.findAll { project ->
        file("${project.projectDir}/src/main/kotlin").exists() ||
                file("${project.projectDir}/src/test/kotlin").exists() ||
                file("${project.projectDir}/src/integrationTest/kotlin").exists() ||
                file("${project.projectDir}/src/testFixtures/kotlin").exists()
    }
    dependsOn(subprojects.collectMany { project ->
        [
                "${project.path}:checkstyleMain",
                "${project.path}:checkstyleTest",
                "${project.path}:pmdMain",
                "${project.path}:pmdTest",
                "${project.path}:classes",
                "${project.path}:testClasses"
        ]
    })
    dependsOn(groovyProjects.collectMany { project ->
        [
                "${project.path}:codenarcMain",
                "${project.path}:codenarcTest"
        ]
    })
    dependsOn(kotlinProjects.collectMany { project ->
        [
                "${project.path}:detekt",
                "${project.path}:ktlintCheck"
        ]
    })
    dependsOn(integrationTestProjects.collectMany { project ->
        [
                "${project.path}:checkstyleIntegrationTest",
                "${project.path}:pmdIntegrationTest"
        ]
    })
}

tasks.register('qualityCoverage') {
    group = 'verification'
    description = 'Runs test suites and coverage report generation for CI quality gate'
    def coverageProjects = qualityCoverageProjects()
    def integrationTestProjects = coverageProjects.findAll { project ->
        file("${project.projectDir}/src/integrationTest").exists()
    }
    dependsOn(coverageProjects.collect { "${it.path}:test" })
    dependsOn(coverageProjects.collect { "${it.path}:jacocoTestReport" })
    dependsOn(coverageProjects.collect { "${it.path}:jacocoTestCoverageVerification" })
    dependsOn(integrationTestProjects.collect { "${it.path}:integrationTest" })
    dependsOn(integrationTestProjects.collect { "${it.path}:jacocoIntegrationTestReport" })
    dependsOn(tasks.named('jacocoOverallCoverageReport'))
    dependsOn(tasks.named('jacocoOverallCoverageVerification'))
}

tasks.register('jacocoOverallCoverageReport', org.gradle.testing.jacoco.tasks.JacocoReport) {
    group = 'verification'
    description = 'Generates an aggregated JaCoCo report for the quality coverage module set'

    def coverageProjects = qualityCoverageProjects()
    dependsOn(coverageProjects.collect { "${it.path}:test" })
    executionData.from(files(coverageProjects.collect { project ->
        project.fileTree(project.layout.buildDirectory) {
            include 'jacoco/test.exec'
        }
    }))
    sourceDirectories.from(files(coverageProjects.collect { project ->
        project.sourceSets.main.allSource.srcDirs
    }))
    additionalSourceDirs.from(files(coverageProjects.collect { project ->
        project.sourceSets.main.allSource.srcDirs
    }))
    classDirectories.from(files(coverageProjects.collect { project ->
        project.sourceSets.main.output
    }))

    reports {
        xml.required = true
        html.required = true
        xml.outputLocation.set(layout.buildDirectory.file('reports/jacoco/overallCoverage/jacocoOverallCoverageReport.xml'))
        html.outputLocation.set(layout.buildDirectory.dir('reports/jacoco/overallCoverage/html'))
    }
}

tasks.register('jacocoOverallCoverageVerification', org.gradle.testing.jacoco.tasks.JacocoCoverageVerification) {
    group = 'verification'
    description = 'Verifies aggregated JaCoCo coverage for the quality coverage module set'

    def coverageProjects = qualityCoverageProjects()
    dependsOn(coverageProjects.collect { "${it.path}:test" })
    executionData.from(files(coverageProjects.collect { project ->
        project.fileTree(project.layout.buildDirectory) {
            include 'jacoco/test.exec'
        }
    }))
    sourceDirectories.from(files(coverageProjects.collect { project ->
        project.sourceSets.main.allSource.srcDirs
    }))
    additionalSourceDirs.from(files(coverageProjects.collect { project ->
        project.sourceSets.main.allSource.srcDirs
    }))
    classDirectories.from(files(coverageProjects.collect { project ->
        project.sourceSets.main.output
    }))

    violationRules {
        rule {
            element = 'BUNDLE'
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = overallCoverageMinimum
            }
        }
    }
}

def writeQualityReportsIndex = {
    def indexFile = layout.buildDirectory.file('reports/quality/index.html').get().asFile
    indexFile.parentFile.mkdirs()

    def sections = [
            'Static Analysis': [
                    [pattern: '**/build/reports/checkstyle/*.html', artifactPrefix: 'checkstyle'],
                    [pattern: '**/build/reports/pmd/*.html', artifactPrefix: 'pmd'],
                    [pattern: '**/build/reports/codenarc/*.html', artifactPrefix: 'codenarc'],
                    [pattern: '**/build/reports/detekt/*.html', artifactPrefix: 'detekt'],
                    [pattern: '**/build/reports/ktlint/*.html', artifactPrefix: 'ktlint'],
                    [pattern: '**/build/reports/spotbugs/*.html', artifactPrefix: 'spotbugs']
            ],
            'Coverage': [
                    [pattern: '**/build/reports/jacoco/*/html/index.html', artifactPrefix: 'jacoco'],
                    [pattern: '**/build/reports/kover/**/index.html', artifactPrefix: 'kover']
            ],
            'Tests': [
                    [pattern: '**/build/reports/tests/**/index.html', artifactPrefix: 'tests']
            ]
    ]

    def rootPath = projectDir.toPath()
    def escape = { String value ->
        value
                .replace('&', '&amp;')
                .replace('<', '&lt;')
                .replace('>', '&gt;')
                .replace('"', '&quot;')
    }
    def artifactHref = { File reportFile, String artifactPrefix ->
        def relativePath = rootPath.relativize(reportFile.toPath()).toString().replace('\\', '/')
        "../${artifactPrefix}/${relativePath}"
    }

    def sectionsHtml = sections.collect { sectionName, entries ->
        def files = entries.collectMany { entry ->
            fileTree(projectDir) {
                include entry.pattern
            }.files.collect { reportFile ->
                [file: reportFile, artifactPrefix: entry.artifactPrefix]
            }
        }
                .findAll { it.file.isFile() }
                .unique { it.file.path }
                .sort { it.file.path }

        def items = files.collect { report ->
            def href = artifactHref(report.file, report.artifactPrefix)
            def label = rootPath.relativize(report.file.toPath()).toString().replace('\\', '/')
            "<li><a href=\"${escape(href)}\">${escape(label)}</a></li>"
        }

        if (items.isEmpty()) {
            items = ['<li>No reports generated for this section</li>']
        }

        """<section>
  <h2>${escape(sectionName)}</h2>
  <ul>
    ${items.join('\n    ')}
  </ul>
</section>"""
    }.join('\n')

    indexFile.text = """<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CRS Quality Reports</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; color: #1f2937; }
    h1 { margin-bottom: 0.25rem; }
    .meta { color: #6b7280; margin-bottom: 1.25rem; }
    section { margin-bottom: 1.5rem; }
    ul { margin-top: 0.5rem; }
    a { color: #0f62fe; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<h1>CRS Quality Reports</h1>
<div class="meta">Generated at ${new Date().format("yyyy-MM-dd HH:mm:ss Z")}</div>
${sectionsHtml}
</body>
</html>
"""
}

tasks.register('qualityReportsIndex') {
    group = 'verification'
    description = 'Generates a single HTML entry point for all quality reports'
    outputs.file(layout.buildDirectory.file('reports/quality/index.html'))
    doLast {
        writeQualityReportsIndex()
    }
}

tasks.named('qualityStatic') {
    finalizedBy(tasks.named('qualityReportsIndex'))
}

tasks.named('qualityCoverage') {
    finalizedBy(tasks.named('qualityReportsIndex'))
}

def shouldGenerateQualityIndexOnBuildFinish = false

gradle.taskGraph.whenReady { graph ->
    shouldGenerateQualityIndexOnBuildFinish = graph.hasTask(tasks.named('build').get())
}

gradle.buildFinished {
    if (shouldGenerateQualityIndexOnBuildFinish) {
        writeQualityReportsIndex()
    }
}
