# `smoke` profile — fast basic-functionality smoke for the [1.0] Compile & UT gate.
#
# Mirrors the existing `ft-db` profile (in-memory H2 in PostgreSQL-compat mode, schema
# generated by Hibernate ddl-auto, Flyway off) but with auto-migrate OFF so the context
# boots EMPTY and fast — no Groovy-fixture import. No Docker / Testcontainers involved.
#
# NON_KEYWORDS=KEY,VALUE: H2 reserves KEY and VALUE; the `registry_config` table
# (RegistryConfigEntity) uses columns named `key` / `value`, so they must be de-reserved.
# Hibernate auto-detects H2Dialect from the connection (same as ft-db — no explicit dialect).
spring:
  datasource:
    url: "jdbc:h2:mem:smoke;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=KEY,VALUE"
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

components-registry:
  database:
    enabled: true
  auto-migrate: false
  default-source: db
