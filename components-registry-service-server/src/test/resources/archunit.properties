# ArchUnit configuration — see docs/registry/non-functional-spec.md §5.3.
#
# FreezingArchRule baseline ("violation store"): the accepted, pre-existing violations of the
# frozen rules are recorded as text files under the path below (committed to VCS, analogous to
# detekt-baseline.xml). Frozen rules fail only on NEW violations; recorded ones are burned down.
freeze.store.default.path=archunit_violation_store

# Do NOT auto-create the store. It is committed to VCS, so on any normal checkout it is present.
# This flag ONLY guards wholesale creation of a MISSING store directory: if the whole
# `archunit_violation_store/` is absent (e.g. deleted), the build fails loudly instead of silently
# regenerating an empty baseline that would mask all current violations. To (re)bootstrap the store
# intentionally, override: -Darchunit.freeze.store.default.allowStoreCreation=true
#
# IMPORTANT — this does NOT make a frozen-rule TEXT change fail fast. Each baseline is keyed by the
# rule's full description (see `stored.rules`); editing a rule's description/`.because(...)` produces
# a NEW key, which — because allowStoreUpdate=true below — is SILENTLY recorded against the current
# violations on the next run (the old key is left orphaned). So a text change can quietly absorb a
# regression. When you change a frozen rule's text you MUST, in the same commit: delete the orphaned
# old key line + its baseline file, re-run to record the new key, and verify the regenerated
# baseline lists exactly the violations you intend to accept.
freeze.store.default.allowStoreCreation=false

# Auto-prune violations that no longer occur (baseline shrinks as code is fixed) AND auto-record a
# rule key not yet in the store. The latter is why a renamed rule does not fail fast — see above.
freeze.store.default.allowStoreUpdate=true

# Never silently absorb NEW violations into the baseline — new breaches must fail the build.
freeze.refreeze=false

# NOTE: each baseline is keyed by the rule's full description text (including its `.because(...)`).
# Changing that text on a frozen rule orphans its stored violations — regenerate the baseline in
# the same commit. See the class KDoc in ArchitectureFitnessTest.kt.
