# ArchUnit configuration — see docs/registry/non-functional-spec.md §5.3.
#
# FreezingArchRule baseline ("violation store"): the accepted, pre-existing violations of the single
# frozen rule (controllers → repositories) are recorded as text files under the path below (committed
# to VCS, analogous to detekt-baseline.xml). It is a RATCHET: baselined violations are allowed; NEW
# ones fail the build.
freeze.store.default.path=archunit_violation_store

# Do NOT auto-create the store. It is committed to VCS, so on any normal checkout it is present. This
# guards against a MISSING store directory silently regenerating an empty baseline that would mask all
# current violations — that fails the build loudly instead. To (re)create intentionally, override:
# -Darchunit.freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreCreation=false

# IMMUTABLE baseline in normal runs. The store is never written during a normal test/CI run: fixed
# violations are NOT auto-pruned, and — crucially — a not-yet-stored rule key is NOT silently recorded.
# That closes the trap where renaming a frozen rule (its baseline is keyed by the full description)
# would otherwise quietly record a fresh baseline against current violations and absorb a regression.
# Updating the baseline is a deliberate, reviewed action: regenerate with
#   -Darchunit.freeze.store.default.allowStoreUpdate=true  (add allowStoreCreation=true when the key
# changed), then inspect the git diff of archunit_violation_store/ before committing.
freeze.store.default.allowStoreUpdate=false

# Never silently absorb NEW violations into an existing baseline — new breaches must fail the build.
freeze.refreeze=false
