# ArchUnit configuration — see docs/registry/non-functional-spec.md §5.3.
#
# FreezingArchRule baseline ("violation store"): the accepted, pre-existing violations of the
# frozen rules are recorded as text files under the path below (committed to VCS, analogous to
# detekt-baseline.xml). Frozen rules fail only on NEW violations; recorded ones are burned down.
freeze.store.default.path=archunit_violation_store

# Do NOT auto-create a baseline. The store is committed to VCS, so on any normal checkout it is
# present. Keeping creation off means a MISSING store (deleted, or a frozen rule's description /
# `.because(...)` changed so its key no longer resolves) FAILS the build loudly instead of silently
# regenerating an empty baseline that masks all current violations. To (re)bootstrap intentionally,
# override on the command line: -Darchunit.freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreCreation=false

# Auto-prune violations that no longer occur, so the baseline shrinks as code is fixed.
freeze.store.default.allowStoreUpdate=true

# Never silently absorb NEW violations into the baseline — new breaches must fail the build.
freeze.refreeze=false

# NOTE: each baseline is keyed by the rule's full description text (including its `.because(...)`).
# Changing that text on a frozen rule orphans its stored violations — regenerate the baseline in
# the same commit. See the class KDoc in ArchitectureFitnessTest.kt.
