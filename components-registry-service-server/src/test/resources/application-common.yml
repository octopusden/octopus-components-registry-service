server:
  port: 4567

components-registry:
  vcs:
    enabled: false
  work-dir: ${COMPONENTS_REGISTRY_SERVICE_TEST_DATA_DIR}/components-registry/common
  main-groovy-file: Aggregator.groovy
  groovy-path: ${components-registry.work-dir}
  dependency-mapping-file: dependency_mapping.properties

  supportedGroupIds: org.octopusden.octopus,io.bcomponent
  supportedSystems: NONE,CLASSIC,ALFA
  version-name:
    service-branch: serviceCBranch
    service: serviceC
    minor: minorC
  product-type:
    c: PT_C
    k: PT_K
    d: PT_D
    ddb: PT_D_DB

pathToConfig: file://${components-registry.groovy-path}

eureka.client.enabled: false

management:
  endpoints:
    web:
      exposure:
        include: metrics
    loggers:
      enabled: true

# Stub auth-server URL so NimbusJwtDecoder gets a well-formed jwk-set-uri at
# context init. AuthServerClient is replaced with a Mockito mock via @MockBean
# in every @SpringBootTest, so no HTTP call is actually made against this URL;
# MockMvc jwt() post-processor bypasses the decoder entirely.
auth-server:
  url: http://localhost:0
  realm: test

octopus-security:
  roles:
    ROLE_ANONYMOUS:
      - ACCESS_COMPONENTS
    ROLE_REGISTRY_VIEWER:
      - ACCESS_COMPONENTS
      - ACCESS_AUDIT
    ROLE_REGISTRY_EDITOR:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ACCESS_AUDIT
    ROLE_ADMIN:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ARCHIVE_COMPONENTS
      - RENAME_COMPONENTS
      - DELETE_COMPONENTS
      - IMPORT_DATA
      - ACCESS_AUDIT