spring:
  cloud:
    config:
      enabled: false
  datasource:
    # H2 treats KEY and VALUE as reserved words, which breaks the generated
    # `create table registry_config (key ..., value ...)` DDL. NON_KEYWORDS opts
    # them out — same workaround as application-test.yml. Required now that
    # ConfigSyncService writes the config-as-code baseline into registry_config
    # at startup (see ADR-016); without the table the fat jar fails to boot.
    url: "jdbc:h2:mem:integrationtestdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY,VALUE"

server:
  port: 0  # Random port

components-registry:
  vcs:
    enabled: false
  groovy-path: # will be set via system property
  work-dir: # will be set via system property
  main-groovy-file: Aggregator.groovy
  project-registry-path: # will be set via system property
  version-name:
    service-branch: serviceBranch
    service: service
    minor: minor
  product-type:
    c: PT_C
    k: PT_K
    d: PT_D
    ddb: PT_D_DB

management:
  endpoints:
    web:
      exposure:
        include: health

teamcity:
  validation:
    gradle-build-template-id: FIXTURE_GRADLE_TEMPLATE
    maven-build-template-id: FIXTURE_MAVEN_TEMPLATE
    release-family-template-ids:
      - FIXTURE_RELEASE_TEMPLATE
    gradle-default-build-step-id: FIXTURE_GRADLE_STEP
    maven-default-build-step-id: FIXTURE_MAVEN_STEP
