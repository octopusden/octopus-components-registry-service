pathToConfig: file://${components-registry.groovy-path}

components-registry:
  auto-migrate: false

# TeamCity sync engine. Defaults are inert: with `base-url` blank and
# `sync.enabled` false, the client makes no HTTP calls and the weekly cron
# bean does not register. Production values come from `service-config`
# per env (f1/service-config: components-registry-service.yml).
teamcity:
  base-url:
  username:
  password:
  sync:
    cron: "0 0 4 * * SUN"

# Employee-service active-employee validation. Defaults are inert: with
# `enabled` false (and `url` blank) no EmployeeServiceClient bean is wired, so
# the active-employee check on componentOwner/releaseManager/securityChampion
# degrades to DISABLED (fail-open) — required/pattern checks still run. Production
# enables it and supplies url/token (or username/password) via `service-config`
# per env; env var names mirror EMPLOYEE_SERVICE_URL / EMPLOYEE_SERVICE_TOKEN.
employee-service:
  enabled: false
  url:
  token:
  username:
  password:
  retry-time-millis: 5000

# auth-server.url and auth-server.realm bind from AUTH_SERVER_URL / AUTH_SERVER_REALM
# env vars via Spring Boot's relaxed binding. Production and dev profiles must
# supply them; WebSecurityConfig.jwtDecoder() fails fast if either is missing.
# Tests override with stub URLs in application-common.yml so the decoder bean can
# be constructed without Keycloak running — MockMvc jwt() post-processor bypasses
# the decoder entirely.
#
# auth-server.disabled (intentionally unset here): FT-only opt-out for environments
# without a Keycloak. When set to true, WebSecurityConfig is skipped and
# AnonymousSecurityConfig loads instead — see those classes for the contract.
# Leaving the property unset preserves the production fail-fast guarantee, so do
# NOT set it in any production profile. Set via env var AUTH_SERVER_DISABLED=true
# or in profile-specific YAML mounted under /application-ft.yml.
auth-server:
  url:
  realm:

# No spring.security.oauth2.resourceserver.jwt.* here: the auto-configured decoder
# either forces eager OIDC discovery (issuer-uri) or skips issuer validation
# (jwk-set-uri alone). Instead WebSecurityConfig provides a custom JwtDecoder
# that is lazy on JWKS fetch AND explicitly enforces the issuer claim.
spring:
  jpa:
    open-in-view: false
    properties:
      # SYS-027: Hibernate 6.4's default JacksonJsonFormatMapper short-circuits for
      # `Object.class` fields with an unsafe `(String) value` cast that blows up on any
      # non-String value (e.g. Map). Our SafeJsonFormatMapper always routes through Jackson.
      hibernate.type.json_format_mapper: org.octopusden.octopus.components.registry.server.config.SafeJsonFormatMapper
      # SYS-040: batch lazy-load fetch size. The v4 list endpoint maps each
      # ComponentEntity through toSummaryResponse(), which dereferences three
      # OneToMany collections (buildConfigurations, jiraComponentConfigs,
      # vcsSettings + nested entries) for the Build System badge and Jira/Git
      # link icons. Without batching, a page of 20 components triggers
      # ~4*20+1 = 81 SELECTs; with batch_fetch_size=50, Hibernate issues a
      # single IN(...) per collection per page → 5 SELECTs total. Page size
      # in the v4 controller is capped at 100, so 50 is comfortable.
      hibernate.default_batch_fetch_size: 50
      # Write-side batching for the migration pipeline. `importModule`
      # persists ~10–20 rows per component (ComponentEntity + base config +
      # system/label/tool junctions + per-range overrides). Without batching,
      # each row is its own INSERT round-trip; on a CPU-throttled OKD pod
      # against a remote DB this dominates Pass 1 (measured 250 s for 948
      # components in QA). With batch_size=50 Hibernate batches sequential
      # INSERTs of the same entity type into a single JDBC statement. Most
      # PKs are `@GeneratedValue(strategy = UUID)` so batching applies;
      # AuditLogEntity uses IDENTITY (not batched) but is not written during
      # migration.
      #
      # `hibernate.order_inserts` is intentionally NOT enabled: it groups
      # inserts across the entire transaction by entity type, which can
      # reorder a `component_systems` junction insert ahead of its
      # `components` parent insert and trip the FK constraint. Sequential
      # batching alone gives us the bulk of the speed-up without that
      # ordering risk.
      hibernate.jdbc.batch_size: 50
  flyway:
    enabled: false

octopus-security:
  roles:
    # Reads on v4 are public at the filter-chain level; ROLE_ANONYMOUS carries
    # ACCESS_COMPONENTS so @PreAuthorize on GET methods also passes without auth.
    # Removing this entry is how we'd later close anonymous reads.
    ROLE_ANONYMOUS:
      - ACCESS_COMPONENTS
    ROLE_COMPONENTS_REGISTRY_VIEWER:
      - ACCESS_COMPONENTS
      - ACCESS_AUDIT
    ROLE_COMPONENTS_REGISTRY_EDITOR:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ACCESS_AUDIT
    # Super-admin — reuses the existing Keycloak realm-role `ADMIN`
    # (bare; converter prefixes ROLE_). F1_ADMIN is a separate f1-security
    # legacy role, not used here.
    ROLE_ADMIN:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ARCHIVE_COMPONENTS
      - RENAME_COMPONENTS
      - DELETE_COMPONENTS
      - IMPORT_DATA
      - ACCESS_AUDIT
      # Edit component-configuration metadata (e.g. Portal Field-Overrides edit surface).
      - EDIT_METADATA
