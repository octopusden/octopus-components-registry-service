pathToConfig: file://${components-registry.groovy-path}

components-registry:
  auto-migrate: false

# auth-server.url and auth-server.realm bind from AUTH_SERVER_URL / AUTH_SERVER_REALM
# env vars via Spring Boot's relaxed binding. Production and dev profiles must
# supply them; WebSecurityConfig.jwtDecoder() fails fast if either is missing.
# Tests override with stub URLs in application-common.yml so the decoder bean can
# be constructed without Keycloak running — MockMvc jwt() post-processor bypasses
# the decoder entirely.
auth-server:
  url:
  realm:

# No spring.security.oauth2.resourceserver.jwt.* here: the auto-configured decoder
# either forces eager OIDC discovery (issuer-uri) or skips issuer validation
# (jwk-set-uri alone). Instead WebSecurityConfig provides a custom JwtDecoder
# that is lazy on JWKS fetch AND explicitly enforces the issuer claim.
spring:
  jpa:
    open-in-view: false
    properties:
      # SYS-027: Hibernate 6.4's default JacksonJsonFormatMapper short-circuits for
      # `Object.class` fields with an unsafe `(String) value` cast that blows up on any
      # non-String value (e.g. Map). Our SafeJsonFormatMapper always routes through Jackson.
      hibernate.type.json_format_mapper: org.octopusden.octopus.components.registry.server.config.SafeJsonFormatMapper
      # SYS-040: batch lazy-load fetch size. The v4 list endpoint maps each
      # ComponentEntity through toSummaryResponse(), which dereferences three
      # OneToMany collections (buildConfigurations, jiraComponentConfigs,
      # vcsSettings + nested entries) for the Build System badge and Jira/Git
      # link icons. Without batching, a page of 20 components triggers
      # ~4*20+1 = 81 SELECTs; with batch_fetch_size=50, Hibernate issues a
      # single IN(...) per collection per page → 5 SELECTs total. Page size
      # in the v4 controller is capped at 100, so 50 is comfortable.
      hibernate.default_batch_fetch_size: 50
  flyway:
    enabled: false

octopus-security:
  roles:
    # Reads on v4 are public at the filter-chain level; ROLE_ANONYMOUS carries
    # ACCESS_COMPONENTS so @PreAuthorize on GET methods also passes without auth.
    # Removing this entry is how we'd later close anonymous reads.
    ROLE_ANONYMOUS:
      - ACCESS_COMPONENTS
    ROLE_REGISTRY_VIEWER:
      - ACCESS_COMPONENTS
      - ACCESS_AUDIT
    ROLE_REGISTRY_EDITOR:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ACCESS_AUDIT
    # Super-admin — reuses the existing Keycloak realm-role `ADMIN`
    # (bare; converter prefixes ROLE_). F1_ADMIN is a separate f1-security
    # legacy role, not used here.
    ROLE_ADMIN:
      - ACCESS_COMPONENTS
      - EDIT_COMPONENTS
      - ARCHIVE_COMPONENTS
      - RENAME_COMPONENTS
      - DELETE_COMPONENTS
      - IMPORT_DATA
      - ACCESS_AUDIT
